<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Classifier - Train & Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #667eea;
            margin-right: 10px;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="file"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="file"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #34495e;
        }

        .btn-secondary:hover {
            background: #bdc3c7;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            margin-top: 10px;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            animation: progress 1.5s infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 100%; }
        }

        .status-message {
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .output-box {
            background: #f8f9fa;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #2c3e50;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .output-line {
            margin-bottom: 8px;
        }

        .output-line.success {
            color: #27ae60;
            font-weight: bold;
        }

        .output-line.error {
            color: #e74c3c;
            font-weight: bold;
        }

        .output-line.info {
            color: #3498db;
            font-weight: bold;
        }

        .prediction-result {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .prediction-result.show {
            display: block;
        }

        .prediction-emotion {
            font-size: 32px;
            font-weight: bold;
            margin-top: 10px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .row {
                grid-template-columns: 1fr;
            }
        }

        .model-status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }

        .model-status.loaded {
            background: #d4edda;
            color: #155724;
        }

        .model-status.not-loaded {
            background: #f8d7da;
            color: #721c24;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Emotion Classifier</h1>
            <p>Train and test your emotion detection model</p>
            <span id="modelStatus" class="model-status"></span>
        </div>

        <div class="content">
            <!-- Quick Navigation -->
            <div class="section" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <a href="/register" style="color: white; text-decoration: none; padding: 10px 15px; background: rgba(255,255,255,0.2); border-radius: 6px; font-weight: 600;">📝 Student Registration</a>
                    <a href="/students" style="color: white; text-decoration: none; padding: 10px 15px; background: rgba(255,255,255,0.2); border-radius: 6px; font-weight: 600;">📚 View Students</a>
                    <a href="/teacher-register" style="color: white; text-decoration: none; padding: 10px 15px; background: rgba(255,255,255,0.2); border-radius: 6px; font-weight: 600;">👨‍🏫 Teacher Registration</a>
                    <a href="/teachers" style="color: white; text-decoration: none; padding: 10px 15px; background: rgba(255,255,255,0.2); border-radius: 6px; font-weight: 600;">👥 View Teachers</a>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">📚 Training Configuration</h2>

                <div class="form-group">
                    <label>Training Data File</label>
                    <input type="text" id="dataFile" placeholder="train.txt" value="train.txt">
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Model Output File</label>
                        <input type="text" id="modelFile" placeholder="text_classifier.joblib" value="text_classifier.joblib">
                    </div>
                    <div class="form-group">
                        <label>Vectorizer Output File</label>
                        <input type="text" id="vectorizerFile" placeholder="tfidf_vectorizer.joblib" value="tfidf_vectorizer.joblib">
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-primary" id="trainBtn" onclick="trainModel()">
                        <span>▶</span> Train Model
                    </button>
                </div>

                <div class="progress-bar" id="progressBar">
                    <div class="progress-bar-fill"></div>
                </div>

                <div class="status-message" id="trainStatus"></div>
            </div>

            <!-- Testing Section -->
            <div class="section">
                <h2 class="section-title">🧪 Test Emotion Prediction</h2>

                <div class="form-group">
                    <label>Enter Text to Classify</label>
                    <textarea id="testText" placeholder="Enter text here..." rows="3">i am feeling sad and hopeless</textarea>
                </div>

                <button class="btn-primary" id="predictBtn" onclick="predictEmotion()">
                    <span>🔍</span> Predict Emotion
                </button>

                <div class="prediction-result" id="predictionResult">
                    <div>Prediction Result</div>
                    <div class="prediction-emotion" id="predictionEmotion"></div>
                </div>
            </div>

            <!-- Output Section -->
            <div class="section">
                <h2 class="section-title">📋 Output & Logs</h2>
                <div class="output-box" id="outputBox"></div>
            </div>
        </div>
    </div>

    <script>
        function addOutput(text, type = '') {
            const outputBox = document.getElementById('outputBox');
            const line = document.createElement('div');
            line.className = 'output-line ' + type;
            line.textContent = text;
            outputBox.appendChild(line);
            outputBox.scrollTop = outputBox.scrollHeight;
        }

        function updateModelStatus() {
            fetch('/api/model-status')
                .then(r => r.json())
                .then(data => {
                    const statusEl = document.getElementById('modelStatus');
                    if (data.loaded) {
                        statusEl.className = 'model-status loaded';
                        statusEl.textContent = '✓ Model Loaded';
                    } else {
                        statusEl.className = 'model-status not-loaded';
                        statusEl.textContent = '✗ No Model';
                    }
                });
        }

        function trainModel() {
            const dataFile = document.getElementById('dataFile').value;
            const modelFile = document.getElementById('modelFile').value;
            const vectorizerFile = document.getElementById('vectorizerFile').value;
            const trainBtn = document.getElementById('trainBtn');

            if (!dataFile) {
                alert('Please enter data file path');
                return;
            }

            trainBtn.disabled = true;
            document.getElementById('progressBar').classList.add('active');
            addOutput('🚀 Starting training...', 'info');

            fetch('/api/train', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    data_file: dataFile,
                    model_file: modelFile,
                    vectorizer_file: vectorizerFile
                })
            })
            .then(r => r.json())
            .then(data => {
                checkTrainingStatus();
            })
            .catch(e => {
                addOutput('❌ Error: ' + e.message, 'error');
                trainBtn.disabled = false;
                document.getElementById('progressBar').classList.remove('active');
            });
        }

        function checkTrainingStatus() {
            fetch('/api/training-status')
                .then(r => r.json())
                .then(data => {
                    addOutput(data.message, data.status);
                    
                    if (data.status === 'training') {
                        setTimeout(checkTrainingStatus, 1000);
                    } else {
                        document.getElementById('trainBtn').disabled = false;
                        document.getElementById('progressBar').classList.remove('active');
                        updateModelStatus();
                    }
                });
        }

        function predictEmotion() {
            const text = document.getElementById('testText').value;

            if (!text) {
                alert('Please enter text');
                return;
            }

            fetch('/api/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    addOutput('📝 Input: ' + data.text, 'info');
                    addOutput('🎯 Prediction: ' + data.prediction, 'success');
                    document.getElementById('predictionEmotion').textContent = data.prediction;
                    document.getElementById('predictionResult').classList.add('show');
                } else {
                    addOutput('❌ Error: ' + data.message, 'error');
                }
            })
            .catch(e => {
                addOutput('❌ Error: ' + e.message, 'error');
            });
        }

        // Initialize
        updateModelStatus();
        addOutput('✓ Ready to train and test', 'info');
    </script>
</body>
</html>
