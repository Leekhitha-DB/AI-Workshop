<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .header-stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .stat-box strong {
            color: #2c3e50;
        }

        .stat-box span {
            font-size: 20px;
            color: #667eea;
            font-weight: bold;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #34495e;
        }

        .btn-secondary:hover {
            background: #bdc3c7;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            font-size: 12px;
            padding: 6px 12px;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .content {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8f9fa;
            border-bottom: 2px solid #ecf0f1;
        }

        th {
            padding: 15px;
            text-align: left;
            color: #2c3e50;
            font-weight: 600;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #ecf0f1;
            color: #34495e;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .id-badge {
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
        }

        .class-badge {
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
        }

        .email-text {
            color: #667eea;
            text-decoration: none;
        }

        .email-text:hover {
            text-decoration: underline;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }

        .empty-state h2 {
            color: #34495e;
            margin-bottom: 10px;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .search-box {
            margin-bottom: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .search-box input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        @media (max-width: 768px) {
            .header-stats {
                flex-direction: column;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Student Records</h1>
            <p>View and manage all registered students</p>
            
            <div class="header-stats">
                <div class="stat-box">
                    <strong>Total Students:</strong> <span id="totalCount">0</span>
                </div>
            </div>

            <div class="nav-buttons" style="margin-top: 20px;">
                <a href="/register" class="btn btn-primary">➕ Add New Student</a>
                <a href="/" class="btn btn-secondary">← Back to Home</a>
            </div>
        </div>

        <div class="content">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search by name, email, or phone...">
            </div>

            <div class="table-responsive">
                <table id="studentsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Class</th>
                            <th>Registered</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
                <div id="emptyState" class="empty-state">
                    <div class="empty-icon">📭</div>
                    <h2>No Students Registered</h2>
                    <p>Click "Add New Student" to register your first student</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allStudents = [];

        async function loadStudents() {
            try {
                const response = await fetch('/api/students');
                const data = await response.json();
                
                if (data.status === 'success') {
                    allStudents = data.students;
                    document.getElementById('totalCount').textContent = data.total;
                    renderTable(allStudents);
                }
            } catch (error) {
                console.error('Error loading students:', error);
            }
        }

        function renderTable(students) {
            const tableBody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');

            if (students.length === 0) {
                tableBody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            tableBody.innerHTML = students.map(student => `
                <tr>
                    <td><span class="id-badge">#${student.id}</span></td>
                    <td><strong>${student.name}</strong></td>
                    <td><a href="mailto:${student.email}" class="email-text">${student.email}</a></td>
                    <td><a href="tel:${student.phone}">${student.phone}</a></td>
                    <td><span class="class-badge">${student.class}</span></td>
                    <td>${new Date(student.registered_at).toLocaleDateString()}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-danger" onclick="deleteStudent(${student.id})">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteStudent(id) {
            if (confirm('Are you sure you want to delete this student?')) {
                try {
                    const response = await fetch(`/api/student/${id}`, {
                        method: 'DELETE'
                    });
                    const data = await response.json();
                    
                    if (data.status === 'success') {
                        loadStudents();
                    }
                } catch (error) {
                    alert('Error deleting student: ' + error.message);
                }
            }
        }

        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allStudents.filter(student => 
                student.name.toLowerCase().includes(query) ||
                student.email.toLowerCase().includes(query) ||
                student.phone.includes(query)
            );
            renderTable(filtered);
        });

        loadStudents();
    </script>
</body>
</html>
